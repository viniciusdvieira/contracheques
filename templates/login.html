{% extends "base.html" %}
{% block content %}
<section class="login-card card-elevated">
  <h2 class="page-title">Acesso</h2>
  <p class="page-subtitle">Entre com sua matr&iacute;cula ou CPF e sua senha.</p>
  <form method="post" class="form">
    <div class="field">
      <label for="matricula">Matr&iacute;cula ou CPF</label>
      <input id="matricula" type="text" name="matricula" placeholder="ex.: 0001234 ou 00000000000" required>
    </div>

    <div class="field">
      <label for="pwd">Senha</label>
      <div class="field-inline">
        <input id="pwd" type="password" name="senha" placeholder="sua senha" required>
        <label class="toggle">
          <input type="checkbox" onclick="togglePwd('pwd')">
          Mostrar
        </label>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Entrar</button>
    </div>
  </form>

  <p class="hint">Primeiro acesso? Sua senha inicial &eacute; <code>agespisa{matr&iacute;cula}</code> (ex.: <code>agespisa12345</code>). Voc&ecirc; ter&aacute; que alter&aacute;-la no primeiro login.</p>
</section>

<script>
function togglePwd(id){
  const el = document.getElementById(id);
  el.type = (el.type === 'password') ? 'text' : 'password';
}
</script>
{% endblock %}
